- name: Maintenance - CI Runner VM
  hosts: proxmox-root
  gather_facts: false
  tags: [ci_runner, maintenance]
  vars:
    ci_runner_ip: "{{ hostvars['proxmox-root']['ci_runner_ip'] | default('192.168.178.13') }}"
    ssh_key_path: "/tmp/.ansible_deploy_key"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i {{ ssh_key_path }}"

  pre_tasks:
    - name: Write deploy key to temp file on Proxmox
      ansible.builtin.copy:
        content: "{{ vault_ansible_deploy_private_key }}"
        dest: "{{ ssh_key_path }}"
        mode: "0600"
      no_log: true

  tasks:
    - name: Run hardened apt maintenance
      ansible.builtin.include_tasks: tasks/maintenance_apt.yml
      vars:
        maint_label: "CI Runner VM"
        maint_ip: "{{ ci_runner_ip }}"
        # Set to false if you want to avoid interrupting in-flight CI jobs.
        maint_auto_reboot: true

    - name: Update registry container
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ ci_runner_ip }} 'cd /opt/stacks/registry && docker compose pull && docker compose up -d'"
      changed_when: false

    - name: Prune unused Docker images
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ ci_runner_ip }} docker image prune -f"
      register: prune_result
      changed_when: false

    - name: Display update summary
