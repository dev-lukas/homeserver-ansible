- name: Maintenance - Development VM
  hosts: proxmox-root
  gather_facts: false
  tags: [dev_vm, maintenance]
  vars:
    dev_vm_ip: "{{ hostvars['proxmox-root']['dev_vm_ip'] | default('192.168.178.12') }}"
    ssh_key_path: "/tmp/.ansible_deploy_key"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i {{ ssh_key_path }}"

  pre_tasks:
    - name: Write deploy key to temp file on Proxmox
      ansible.builtin.copy:
        content: "{{ vault_ansible_deploy_private_key }}"
        dest: "{{ ssh_key_path }}"
        mode: "0600"
      no_log: true

  tasks:
    - name: Run hardened apt maintenance
      ansible.builtin.include_tasks: tasks/maintenance_apt.yml
      vars:
        maint_label: "Development VM"
        maint_ip: "{{ dev_vm_ip }}"
        # Report-only: never auto-reboot the dev VM (may have live work/sessions).
        maint_auto_reboot: false

    - name: Update Claude Code
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ dev_vm_ip }} 'claude update'"
      register: claude_update
      changed_when: false
      failed_when: false

    - name: Display update summary
      ansible.builtin.debug:
        msg: |
          Development VM updated.
          Packages upgraded: {{ maint_apt.changed }}
          Claude Code: {{ claude_update.stdout | default('update attempted') }}

  post_tasks:
    - name: Remove deploy key from Proxmox
      ansible.builtin.file:
        path: "{{ ssh_key_path }}"
