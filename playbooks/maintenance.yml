---
# Maintenance playbook - Updates all infrastructure components
# Usage: ansible-playbook playbooks/maintenance.yml --ask-vault-pass
# Or target specific hosts: ansible-playbook playbooks/maintenance.yml --ask-vault-pass --limit proxmox-root

- name: Maintenance - Proxmox Host
  hosts: proxmox-root
  gather_facts: false
  tags: [proxmox, maintenance]
  vars:
    glances_venv_path: "{{ hostvars['proxmox-root']['glances_venv_path'] | default('/opt/glances') }}"
    glances_port: "{{ hostvars['proxmox-root']['glances_port'] | default(61208) }}"
  pre_tasks:
    - name: Write deploy key to temp file
      ansible.builtin.copy:
        content: "{{ vault_ansible_deploy_private_key }}"
        dest: /tmp/.ansible_deploy_key
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
      no_log: true
      tags: always

  tasks:
    - name: Recover from any interrupted package operation
      ansible.builtin.command:
        cmd: dpkg --configure -a
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600

    - name: Upgrade packages (no dist-upgrade)
      ansible.builtin.apt:
        upgrade: safe
        lock_timeout: 600
      register: apt_upgrade
      until: apt_upgrade is succeeded
      retries: 3
      delay: 30

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true
        autoclean: true
        lock_timeout: 600

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Record Proxmox maintenance result (reboot is report-only)
      ansible.builtin.set_fact:
        maintenance_report: "{{ maintenance_report | default([]) + [_entry] }}"
      vars:
        _entry:
          host: "Proxmox host"
          upgraded: "{{ apt_upgrade.changed }}"
          reboot_required: "{{ reboot_required.stat.exists | default(false) }}"
          rebooted: false

    - name: Check if Glances venv exists
      ansible.builtin.stat:
        path: "{{ glances_venv_path }}/bin/pip"
      register: glances_venv

    - name: Update Glances in venv
      ansible.builtin.pip:
        name:
          - glances[web]
        state: latest
        virtualenv: "{{ glances_venv_path }}"
      register: glances_update
      when: glances_venv.stat.exists

    - name: Restart Glances if updated
      ansible.builtin.systemd:
        name: glances
        state: restarted
      when:
        - glances_venv.stat.exists
        - glances_update is defined
        - glances_update.changed

    - name: Verify Glances API is reachable
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ glances_port }}/api/4/status"
        method: GET
        status_code: [200]
      register: glances_health
      retries: 3
      delay: 5
      until: glances_health.status == 200
      when: glances_venv.stat.exists

    - name: Set Glances maintenance status
      ansible.builtin.set_fact:
        glances_maintenance_status: >-
          {{
            'updated' if (glances_venv.stat.exists and glances_update is defined and glances_update.changed)
            else 'up-to-date' if glances_venv.stat.exists
            else 'not-installed'
          }}

    - name: Display update summary
      ansible.builtin.debug:
        msg: |
          Proxmox host updated.
          Packages upgraded: {{ apt_upgrade.changed }}
          Reboot required: {{ reboot_required.stat.exists | default(false) }}
          Glances status: {{ glances_maintenance_status | default('not-checked') }}

- name: Maintenance - AdGuard LXC
  hosts: proxmox-root
  gather_facts: false
  tags: [adguard, maintenance]
  vars:
    adguard_vmid: "{{ hostvars['proxmox-root']['adguard_vmid'] | default(100) }}"
  tasks:
    - name: Update Alpine packages
      ansible.builtin.command:
        cmd: "pct exec {{ adguard_vmid }} -- apk update"
      changed_when: false

    - name: Upgrade Alpine packages
      ansible.builtin.command:
        cmd: "pct exec {{ adguard_vmid }} -- apk upgrade --no-cache"
      register: apk_upgrade
      changed_when: "'Installing' in apk_upgrade.stdout or 'Upgrading' in apk_upgrade.stdout"

    - name: Update AdGuard Home binary
      ansible.builtin.command:
        cmd: "pct exec {{ adguard_vmid }} -- /opt/AdGuardHome/AdGuardHome --update"
      register: adguard_update
      changed_when: "'updated' in adguard_update.stdout.lower()"
      failed_when: false

    - name: Display AdGuard update result
      ansible.builtin.debug:
        msg: "{{ adguard_update.stdout | default('AdGuard update completed') }}"

    - name: Record AdGuard maintenance result
      ansible.builtin.set_fact:
        maintenance_report: "{{ maintenance_report | default([]) + [_entry] }}"
      vars:
        _entry:
          host: "AdGuard LXC"
          upgraded: "{{ apk_upgrade.changed }}"
          reboot_required: false
          rebooted: false

- name: Maintenance - Reverse Proxy LXC
  hosts: proxmox-root
  gather_facts: false
  tags: [reverse_proxy, maintenance]
  vars:
    reverse_proxy_vmid: "{{ hostvars['proxmox-root']['reverse_proxy_vmid'] | default(103) }}"
  tasks:
    - name: Upgrade packages (lock-aware, self-healing, retried)
      ansible.builtin.shell:
        cmd: "pct exec {{ reverse_proxy_vmid }} -- bash -s"
        stdin: "{{ apt_maintenance_script }}"
      register: apt_upgrade
      changed_when: "'PKGS_CHANGED' in apt_upgrade.stdout"
      until: apt_upgrade.rc == 0
      retries: 3
      delay: 30

    - name: Check if nginx needs reload
      ansible.builtin.command:
        cmd: "pct exec {{ reverse_proxy_vmid }} -- nginx -t"
      register: nginx_test
      changed_when: false
      failed_when: false

    - name: Reload nginx if config is valid
      ansible.builtin.command:
        cmd: "pct exec {{ reverse_proxy_vmid }} -- systemctl reload nginx"
      when: nginx_test.rc == 0
      changed_when: false

    - name: Record Reverse Proxy maintenance result
      ansible.builtin.set_fact:
        maintenance_report: "{{ maintenance_report | default([]) + [_entry] }}"
      vars:
        _entry:
          host: "Reverse Proxy LXC"
          upgraded: "{{ apt_upgrade.changed }}"
          reboot_required: false
          rebooted: false

- name: Maintenance - Local Services VM
  hosts: proxmox-root
  gather_facts: false
  tags: [local_services, maintenance]
  vars:
    local_services_ip: "{{ hostvars['proxmox-root']['local_services_ip'] | default('192.168.178.5') }}"
    stacks_dir: "/opt/stacks"
    ssh_key_path: "/tmp/.ansible_deploy_key"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i {{ ssh_key_path }}"

  pre_tasks:
    - name: Write deploy key to temp file on Proxmox
      ansible.builtin.copy:
        content: "{{ vault_ansible_deploy_private_key }}"
        dest: "{{ ssh_key_path }}"
        mode: "0600"
      no_log: true

  tasks:
    - name: Run hardened apt maintenance
      ansible.builtin.include_tasks: tasks/maintenance_apt.yml
      vars:
        maint_label: "Local Services VM"
        maint_ip: "{{ local_services_ip }}"
        maint_auto_reboot: true

    - name: Pull and recreate Docker stacks
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ local_services_ip }} 'cd {{ stacks_dir }}/{{ item }} && docker compose pull && docker compose up -d'"
      loop:
        - bentopdf
        - vert
        - mealie
        - homepage
      register: stack_updates
      changed_when: false

    - name: Prune unused Docker images
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ local_services_ip }} docker image prune -f"
      register: prune_result
      changed_when: false

    - name: Display Docker update summary
      ansible.builtin.debug:
        msg: |
          Local Services VM updated.
          Docker stacks recreated: bentopdf, vert, mealie, homepage
          Pruned: {{ prune_result.stdout_lines[-1] | default('Done') }}

  post_tasks:
    - name: Remove deploy key from Proxmox
      ansible.builtin.file:
        path: "{{ ssh_key_path }}"
        state: absent

    - name: Remove local deploy key
      ansible.builtin.file:
        path: /tmp/.ansible_deploy_key
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      tags: always

- name: Maintenance - Media Services VM
  hosts: proxmox-root
  gather_facts: false
  tags: [media_services, maintenance]
  vars:
    media_services_ip: "{{ hostvars['proxmox-root']['media_services_ip'] | default('192.168.178.11') }}"
    stacks_dir: "/opt/stacks"
    ssh_key_path: "/tmp/.ansible_deploy_key"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i {{ ssh_key_path }}"
    # Stacks that have their own network
    media_services_standalone_stacks:
      - sonarr
      - sonarr-anime
      - radarr
      - radarr-anime
    # Stacks using network_mode: container:gluetun (must be restarted after gluetun)
    media_services_gluetun_stacks:
      - prowlarr
      - sabnzbd
      - qbittorrent
      - umlautadaptarr

  pre_tasks:
    - name: Write deploy key to temp file on Proxmox
      ansible.builtin.copy:
        content: "{{ vault_ansible_deploy_private_key }}"
        dest: "{{ ssh_key_path }}"
        mode: "0600"
      no_log: true

  tasks:
    - name: Run hardened apt maintenance
      ansible.builtin.include_tasks: tasks/maintenance_apt.yml
      vars:
        maint_label: "Media Services VM"
        maint_ip: "{{ media_services_ip }}"
        maint_auto_reboot: true

    - name: Pull all Docker images
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} 'cd {{ stacks_dir }}/{{ item }} && docker compose pull'"
      loop: "{{ ['gluetun'] + media_services_gluetun_stacks + media_services_standalone_stacks }}"
      changed_when: false

    - name: Update standalone stacks
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} 'cd {{ stacks_dir }}/{{ item }} && docker compose up -d'"
      loop: "{{ media_services_standalone_stacks }}"
      changed_when: false

    - name: Stop gluetun-dependent stacks
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} 'cd {{ stacks_dir }}/{{ item }} && docker compose down'"
      loop: "{{ media_services_gluetun_stacks }}"
      changed_when: false

    - name: Update gluetun
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} 'cd {{ stacks_dir }}/gluetun && docker compose up -d'"
      changed_when: false

    - name: Start gluetun-dependent stacks
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} 'cd {{ stacks_dir }}/{{ item }} && docker compose up -d'"
      loop: "{{ media_services_gluetun_stacks }}"
      changed_when: false

    - name: Prune unused Docker images
      ansible.builtin.shell:
        cmd: "ssh {{ ssh_opts }} root@{{ media_services_ip }} docker image prune -f"
      register: prune_result
      changed_when: false

    - name: Display update summary
      ansible.builtin.debug:
        msg: |
          Media Services VM updated.
          Packages upgraded: {{ maint_apt.changed }}
          Pruned: {{ prune_result.stdout_lines[-1] | default('Done') }}

  post_tasks:
    - name: Remove deploy key from Proxmox
      ansible.builtin.file:
        path: "{{ ssh_key_path }}"
        state: absent

    - name: Remove local deploy key
      ansible.builtin.file:
        path: /tmp/.ansible_deploy_key
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      tags: always

