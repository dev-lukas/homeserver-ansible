        msg: |
          CI Runner VM updated.
          Packages upgraded: {{ maint_apt.changed }}
          Pruned: {{ prune_result.stdout_lines[-1] | default('Done') }}

  post_tasks:
    - name: Remove deploy key from Proxmox
      ansible.builtin.file:
        path: "{{ ssh_key_path }}"
        state: absent

    - name: Remove local deploy key
      ansible.builtin.file:
        path: /tmp/.ansible_deploy_key
        state: absent
      delegate_to: localhost
      become: false
      run_once: true
      tags: always

- name: Maintenance - Summary
  hosts: proxmox-root
  gather_facts: false
  tags: [always]
  tasks:
    - name: Maintenance summary (per host)
      ansible.builtin.debug:
        msg: |-
          ===== Maintenance summary =====
          {% for h in maintenance_report | default([]) %}
          {{ "%-20s" | format(h.host) }} upgraded={{ h.upgraded }} reboot_required={{ h.reboot_required }} rebooted={{ h.rebooted }}
          {% endfor %}
          {% set pending = maintenance_report | default([]) | selectattr('reboot_required') | rejectattr('rebooted') | map(attribute='host') | list %}
          {% if pending | length > 0 %}
          ACTION NEEDED - reboot still pending on: {{ pending | join(', ') }}
          {% else %}
          No outstanding reboots.
          {% endif %}

- import_playbook: reverse_proxy_verify.yml
