---
# Immich VM role defaults

# VM settings
immich_vmid: 102
immich_hostname: "immich"
immich_storage: "vmpool"
immich_disk_size: "64"
immich_memory: 8192
immich_cores: 4
immich_cpu_type: "host"

# Cloud image settings (Debian 13)
immich_cloud_image_url: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2"
immich_cloud_image_path: "/var/lib/vz/template/iso/debian-13-generic-amd64.qcow2"

# Network configuration
immich_bridge: "vmbr0"
immich_ip: "192.168.178.14"
immich_gateway: "192.168.178.1"
immich_netmask: "24"
immich_nameserver: "192.168.178.2"

# SSH settings
immich_ssh_port: 22

# Docker settings
immich_stacks_dir: "/opt/stacks"
immich_docker_prune_schedule: "0 5 * * 0"

# NFS mount
immich_nfs_server: "192.168.178.56"
immich_nfs_export: "/mediapool/immich"
immich_nfs_mount: "/mnt/immich"
immich_upload_location: "{{ immich_nfs_mount }}/library"
immich_db_data_location: "{{ immich_stacks_dir }}/immich/postgres"

# Immich settings
immich_version: "release"
immich_web_port: 2283
immich_timezone: "Europe/Berlin"
immich_db_username: "postgres"
immich_db_name: "immich"

# UFW settings
immich_ufw_default_incoming: "deny"
immich_ufw_default_outgoing: "allow"
