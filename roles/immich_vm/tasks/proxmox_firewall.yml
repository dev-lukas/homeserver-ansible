---
# Configure Proxmox firewall for Immich VM

- name: Enable datacenter firewall
  ansible.builtin.command:
    cmd: pvesh set /cluster/firewall/options --enable 1
  changed_when: false

- name: Ensure firewall config directory exists
  ansible.builtin.file:
    path: /etc/pve/firewall
    state: directory
    mode: "0755"

- name: Configure Immich VM firewall
  ansible.builtin.shell:
    cmd: |
      cat > /etc/pve/firewall/{{ immich_vmid }}.fw << FWEOF
      [OPTIONS]
      enable: 1
      policy_in: DROP
      policy_out: ACCEPT

      [RULES]
      # SSH access to VM
      IN ACCEPT -p tcp -dport {{ immich_ssh_port }} -log nolog

      # Immich web UI/API
      IN ACCEPT -p tcp -dport {{ immich_web_port }} -log nolog

      # Allow ICMP (ping)
      IN ACCEPT -p icmp -log nolog
      FWEOF
  notify: Reload pve-firewall

- name: Get current net0 MAC address
  ansible.builtin.shell:
    cmd: "qm config {{ immich_vmid }} | grep '^net0:' | grep -oP 'virtio=\\K[0-9A-Fa-f:]+'"
  register: mac_result
  changed_when: false
  failed_when: false

- name: Enable firewall on VM network interface (preserving MAC)
  ansible.builtin.command:
    cmd: "qm set {{ immich_vmid }} --net0 virtio={{ mac_result.stdout }},bridge={{ immich_bridge }},firewall=1"
  when: mac_result.stdout != ''
  changed_when: false
