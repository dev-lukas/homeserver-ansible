---
# Install Claude Code CLI via native installer

- name: Check if Claude Code is already installed
  ansible.builtin.command:
    cmd: claude --version
  register: claude_check
  changed_when: false
  failed_when: false

- name: Install Claude Code via native installer
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
  when: claude_check.rc != 0

- name: Verify Claude Code installation
  ansible.builtin.command:
    cmd: claude --version
  register: claude_version
  changed_when: false
  failed_when: false

- name: Display Claude Code version
  ansible.builtin.debug:
    msg: "Claude Code installed: {{ claude_version.stdout | default('installation pending') }}"
