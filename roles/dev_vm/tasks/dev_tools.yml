---
# Install development tools

- name: Install common development packages
  ansible.builtin.apt:
    name:
      - git
      - build-essential
      - make
      - cmake
      - htop
      - tmux
      - vim
      - unzip
      - jq
      - tree
      - ripgrep
      - fd-find
      - ssh-client
      - openssh-server
      - rsync
      - strace
      - net-tools
      - dnsutils
      - iputils-ping
    state: present

# Python development
- name: Install Python development packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-dev
      - python3-pip
      - python3-venv
    state: present

# Node.js via NodeSource
- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/setup_22.x
    dest: /tmp/nodesource_setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  ansible.builtin.command:
    cmd: bash /tmp/nodesource_setup.sh
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Remove NodeSource setup script
  ansible.builtin.file:
    path: /tmp/nodesource_setup.sh
    state: absent

- name: Verify Node.js version
  ansible.builtin.command:
    cmd: node --version
  register: node_version
  changed_when: false

- name: Display Node.js version
  ansible.builtin.debug:
    msg: "Node.js installed: {{ node_version.stdout }}"

- name: Verify npm version
  ansible.builtin.command:
    cmd: npm --version
  register: npm_version
  changed_when: false

- name: Display npm version
  ansible.builtin.debug:
    msg: "npm installed: {{ npm_version.stdout }}"

# Git configuration
- name: Configure git default branch
  ansible.builtin.command:
    cmd: git config --global init.defaultBranch main
  changed_when: false

- name: Configure git user name
  ansible.builtin.command:
    cmd: git config --global user.name "{{ dev_vm_git_user }}"
  changed_when: false

- name: Configure git user email
  ansible.builtin.command:
    cmd: git config --global user.email "{{ dev_vm_git_email }}"
  changed_when: false
