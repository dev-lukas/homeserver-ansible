---
# Install Docker Engine inside the LXC, using the fuse-overlayfs storage driver
# (overlay2 does not work in an unprivileged, nested LXC on ZFS).

- name: Install Docker prerequisites + fuse-overlayfs
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - fuse-overlayfs
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg --yes
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions on Docker GPG key
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable"
    state: present
    filename: docker

- name: Ensure /etc/docker directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker to use the fuse-overlayfs storage driver
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: |
      {
        "storage-driver": "fuse-overlayfs"
      }

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Verify Docker is using fuse-overlayfs
  ansible.builtin.command:
    cmd: docker info --format '{{ "{{" }} .Driver {{ "}}" }}'
  register: docker_driver
  changed_when: false
  failed_when: "'fuse-overlayfs' not in docker_driver.stdout"

- name: Create stacks directory
  ansible.builtin.file:
    path: "{{ immich_stacks_dir | default('/opt/stacks') }}"
    state: directory
    mode: "0755"
