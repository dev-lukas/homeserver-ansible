---
# Deploy Immich Docker Compose stack (standalone copy for the apps LXC).
# Library lives on the bind-mounted ZFS dir ({{ immich_nfs_mount }}); the
# container runs Immich as default root -> host 100000 via idmap.

- name: Validate Immich database password is configured
  ansible.builtin.assert:
    that:
      - vault_immich_db_password is defined
      - vault_immich_db_password | length > 0
    fail_msg: "vault_immich_db_password must be set for Immich."
  no_log: true

- name: Ensure Immich library mount is active before deploying
  ansible.builtin.command:
    cmd: "mountpoint -q {{ immich_nfs_mount }}"
  changed_when: false

- name: Create Immich stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ immich_stacks_dir }}/immich"
    - "{{ immich_db_data_location }}"

- name: Deploy Immich environment file
  ansible.builtin.copy:
    dest: "{{ immich_stacks_dir }}/immich/.env"
    mode: "0600"
    content: |
      UPLOAD_LOCATION={{ immich_upload_location }}
      DB_DATA_LOCATION={{ immich_db_data_location }}
      TZ={{ immich_timezone }}
      IMMICH_VERSION={{ immich_version }}
      DB_PASSWORD={{ vault_immich_db_password }}
      DB_USERNAME={{ immich_db_username }}
      DB_DATABASE_NAME={{ immich_db_name }}
  no_log: true

- name: Deploy Immich docker-compose.yml
  ansible.builtin.copy:
    dest: "{{ immich_stacks_dir }}/immich/docker-compose.yml"
    mode: "0644"
    content: |
      name: immich

      services:
        immich-server:
          container_name: immich_server
          image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
          volumes:
            - ${UPLOAD_LOCATION}:/data
            - /etc/localtime:/etc/localtime:ro
          env_file:
            - .env
          ports:
            - "{{ immich_web_port }}:2283"
          depends_on:
            - redis
            - database
          restart: always
          healthcheck:
            disable: false

        immich-machine-learning:
          container_name: immich_machine_learning
          image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
          volumes:
            - model-cache:/cache
          env_file:
            - .env
          restart: always
          healthcheck:
            disable: false

        redis:
          container_name: immich_redis
          image: docker.io/valkey/valkey:9
          healthcheck:
            test: redis-cli ping || exit 1
          restart: always

        database:
          container_name: immich_postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
          environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_DB: ${DB_DATABASE_NAME}
            POSTGRES_INITDB_ARGS: '--data-checksums'
          volumes:
            - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
          shm_size: 128mb
          restart: always
          healthcheck:
            disable: false

      volumes:
        model-cache:

# --- One-shot DB restore (cutover only; apps_lxc_immich_restore=true) ---
# Brings up only the database, restores Immich's own backup with the OFFICIAL
# procedure, then the main "Start Immich stack" task starts immich-server/ML.

- name: Start only the database for restore
  ansible.builtin.command:
    cmd: docker compose up -d database redis
    chdir: "{{ immich_stacks_dir }}/immich"
  when: apps_lxc_immich_restore | default(false) | bool
  changed_when: true

- name: Wait for Postgres to be healthy
  ansible.builtin.command:
    cmd: docker inspect -f '{{ "{{" }}.State.Health.Status{{ "}}" }}' immich_postgres
  register: immich_pg_health
  until: immich_pg_health.stdout == "healthy"
  retries: 30
  delay: 4
  changed_when: false
  when: apps_lxc_immich_restore | default(false) | bool

- name: Check whether Immich DB is already populated (restore safety guard)
  ansible.builtin.command:
    cmd: docker exec immich_postgres psql -U {{ immich_db_username }} -d {{ immich_db_name }} -tAc "select to_regclass('public.asset') is not null;"
  register: immich_db_populated
  changed_when: false
  failed_when: false
  when: apps_lxc_immich_restore | default(false) | bool

- name: Resolve latest backup file when none specified
  ansible.builtin.command:
    cmd: "bash -lc 'ls -1 {{ immich_upload_location }}/backups/immich-db-backup-*.sql.gz | tail -1'"
  register: immich_latest_backup
  changed_when: false
  when:
    - apps_lxc_immich_restore | default(false) | bool
    - apps_lxc_immich_restore_file | default('') == ''

- name: "Restore Immich database (official restore: search_path rewrite + dbname=immich)"
  ansible.builtin.shell:
    cmd: >
      set -o pipefail;
      gunzip < "{{ apps_lxc_immich_restore_file if (apps_lxc_immich_restore_file | default('') != '') else immich_latest_backup.stdout }}"
      | sed "s/SELECT pg_catalog.set_config('search_path', '', false);/SELECT pg_catalog.set_config('search_path', 'public, pg_catalog', true);/g"
      | docker exec -i immich_postgres psql --dbname={{ immich_db_name }} --username={{ immich_db_username }}
    executable: /bin/bash
  register: immich_restore
  changed_when: true
  when:
    - apps_lxc_immich_restore | default(false) | bool
    - "'t' not in (immich_db_populated.stdout | default('t'))"

- name: Start Immich stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ immich_stacks_dir }}/immich"
  register: immich_start
  changed_when: "'Started' in immich_start.stderr or 'Created' in immich_start.stderr or 'Recreated' in immich_start.stderr"

- name: Wait for Immich server port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ immich_web_port }}"
    timeout: 300

- name: Verify Immich containers are running
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: "{{ immich_stacks_dir }}/immich"
  register: immich_ps
  changed_when: false

- name: Display Immich container status
  ansible.builtin.debug:
    msg: "{{ immich_ps.stdout_lines }}"
