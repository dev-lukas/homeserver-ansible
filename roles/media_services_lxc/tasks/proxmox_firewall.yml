---
# Configure the Proxmox host firewall for the media LXC (default-drop inbound,
# allow SSH + the *arr/download service ports + ICMP). Written with a heredoc
# because /etc/pve (pmxcfs) rejects the copy module's atomic rename.

- name: Enable datacenter firewall
  ansible.builtin.command:
    cmd: pvesh set /cluster/firewall/options --enable 1
  changed_when: false

- name: Ensure firewall config directory exists
  ansible.builtin.file:
    path: /etc/pve/firewall
    state: directory
    mode: "0755"

- name: Configure media LXC firewall
  ansible.builtin.shell:
    cmd: |
      cat > /etc/pve/firewall/{{ media_lxc_vmid }}.fw << 'FWEOF'
      [OPTIONS]
      enable: 1
      policy_in: DROP
      policy_out: ACCEPT

      [RULES]
      # SSH access
      IN ACCEPT -p tcp -dport {{ media_services_ssh_port }} -log nolog
      # Prowlarr (via gluetun)
      IN ACCEPT -p tcp -dport {{ media_services_prowlarr_port }} -log nolog
      # Sonarr
      IN ACCEPT -p tcp -dport {{ media_services_sonarr_port }} -log nolog
      # Radarr
      IN ACCEPT -p tcp -dport {{ media_services_radarr_port }} -log nolog
      # Sonarr Anime
      IN ACCEPT -p tcp -dport {{ media_services_sonarr_anime_port }} -log nolog
      # Radarr Anime
      IN ACCEPT -p tcp -dport {{ media_services_radarr_anime_port }} -log nolog
      # SABnzbd (via gluetun)
      IN ACCEPT -p tcp -dport {{ media_services_sabnzbd_port }} -log nolog
      # qBittorrent (via gluetun)
      IN ACCEPT -p tcp -dport {{ media_services_qbittorrent_port }} -log nolog
      # Umlautadaptarr (via gluetun)
      IN ACCEPT -p tcp -dport {{ media_services_umlautadaptarr_port }} -log nolog
      # ICMP (ping)
      IN ACCEPT -p icmp -log nolog
      FWEOF
  changed_when: true
  notify: Reload pve-firewall

- name: Get current net0 configuration
  ansible.builtin.command:
    cmd: "pct config {{ media_lxc_vmid }}"
  register: media_net0_config
  changed_when: false

- name: Enable firewall on container network interface
  ansible.builtin.command:
    cmd: >
      pct set {{ media_lxc_vmid }} --net0
      name=eth0,bridge={{ media_lxc_bridge }},ip={{ media_lxc_ip }}/{{ media_lxc_netmask }},gw={{ media_lxc_gateway }},firewall=1
  when: "'firewall=1' not in media_net0_config.stdout"
  changed_when: true
