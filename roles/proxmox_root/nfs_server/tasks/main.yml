---
# NFS server setup on Proxmox
# Exports mediapool for VMs to mount

- name: Install NFS server packages
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
      - nfs-common
    state: present
    update_cache: true

- name: Ensure export directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ nfs_exports }}"

# Create media subdirectories with correct ownership for containers (PUID/PGID 1000)
- name: Create media subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0775"
  loop:
    - /mediapool/media/tv
    - /mediapool/media/movies
    - /mediapool/media/anime
    - /mediapool/media/anime-movies
    - /mediapool/media/documentaries
    - /mediapool/media/downloads
    - /mediapool/media/downloads/incomplete

- name: Create Immich library directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /mediapool/immich
    - /mediapool/immich/library

# Jellyfin transcoding cache - owned by UID 100102 (unprivileged LXC maps UID 102→100102)
# Jellyfin runs as UID 102 inside the container
- name: Create transcoding directory for Jellyfin
  ansible.builtin.file:
    path: /mediapool/media/transcoding
    state: directory
    owner: "100102"
    group: "100105"
    mode: "0755"

- name: Set ownership on media directory
  ansible.builtin.file:
    path: /mediapool/media
    owner: "1000"
    group: "1000"
    mode: "0775"
    recurse: true

# Re-apply transcoding ownership after recursive chown above
- name: Set ownership on transcoding directory
  ansible.builtin.file:
    path: /mediapool/media/transcoding
    owner: "100102"
    group: "100105"
    mode: "0755"
    recurse: true

- name: Configure NFS exports
  ansible.builtin.template:
    dest: /etc/exports
    src: exports.j2
    mode: "0644"
  notify: Reload NFS exports

- name: Enable and start NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    state: started
    enabled: true

- name: Apply NFS exports before dependent roles mount them
  ansible.builtin.command:
    cmd: exportfs -ra
  changed_when: false

- name: Verify NFS exports
  ansible.builtin.command:
    cmd: exportfs -v
  register: nfs_exports_status
  changed_when: false

- name: Display current NFS exports
  ansible.builtin.debug:
    msg: "{{ nfs_exports_status.stdout_lines }}"

- name: Verify Immich NFS export is active
  ansible.builtin.assert:
    that:
      - "'/mediapool/immich' in nfs_exports_status.stdout"
      - "immich_ip in nfs_exports_status.stdout"
    fail_msg: "Immich export is not active for {{ immich_ip }}. Current exports: {{ nfs_exports_status.stdout }}"

# Configure Proxmox cluster firewall to allow NFS traffic from approved VMs only
- name: Ensure cluster firewall file exists
  ansible.builtin.shell:
    cmd: |
      set -eu
      mkdir -p /etc/pve/firewall
      if [ ! -e /etc/pve/firewall/cluster.fw ]; then
        cat > /etc/pve/firewall/cluster.fw <<'FWEOF'
      [OPTIONS]
      policy_in: DROP
      enable: 1

      [RULES]
      FWEOF
        chmod 0640 /etc/pve/firewall/cluster.fw || true
        echo changed
      else
        echo unchanged
      fi
  register: nfs_cluster_fw_base
  changed_when: "nfs_cluster_fw_base.stdout == 'changed'"

- name: Add NFS firewall rules to Proxmox cluster
  ansible.builtin.shell:
    cmd: |
      set -eu
      file=/etc/pve/firewall/cluster.fw
      begin="# BEGIN ANSIBLE MANAGED - NFS Server"
      end="# END ANSIBLE MANAGED - NFS Server"
      block="$(cat <<'BLOCKEOF'
      IN ACCEPT -source {{ media_services_ip }} -p tcp -dport 111 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p udp -dport 111 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p tcp -dport 2049 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p udp -dport 2049 -log nolog
      IN ACCEPT -source {{ immich_ip }} -p tcp -dport 111 -log nolog
      IN ACCEPT -source {{ immich_ip }} -p udp -dport 111 -log nolog
      IN ACCEPT -source {{ immich_ip }} -p tcp -dport 2049 -log nolog
      IN ACCEPT -source {{ immich_ip }} -p udp -dport 2049 -log nolog
      BLOCKEOF
      )"

      current="$(cat "$file")"
      without_block="$(
        awk -v begin="$begin" -v end="$end" '
          $0 == begin { skip = 1; next }
          $0 == end { skip = 0; next }
          !skip { print }
        ' "$file"
      )"
      desired="$(
        printf '%s\n' "$without_block" | awk -v begin="$begin" -v end="$end" -v block="$block" '
          BEGIN { inserted = 0 }
          { print; if ($0 == "[RULES]" && !inserted) { print begin; print block; print end; inserted = 1 } }
          END { if (!inserted) { print ""; print "[RULES]"; print begin; print block; print end } }
        '
      )"

      if [ "$current" != "$desired" ]; then
        printf '%s\n' "$desired" > "$file"
        echo changed
      else
        echo unchanged
      fi
  register: nfs_cluster_fw_rules
  changed_when: "nfs_cluster_fw_rules.stdout == 'changed'"
  notify: Reload pve-firewall

- name: Apply NFS firewall rules before dependent roles mount shares
  ansible.builtin.meta: flush_handlers
