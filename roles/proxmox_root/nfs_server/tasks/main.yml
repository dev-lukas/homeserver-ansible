---
# NFS server setup on Proxmox
# Exports mediapool for VMs to mount

- name: Install NFS server packages
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
      - nfs-common
    state: present
    update_cache: true

- name: Ensure export directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ nfs_exports }}"

# Create media subdirectories with correct ownership for containers (PUID/PGID 1000)
- name: Create media subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0775"
  loop:
    - /mediapool/media/tv
    - /mediapool/media/movies
    - /mediapool/media/anime
    - /mediapool/media/anime-movies
    - /mediapool/media/documentaries
    - /mediapool/media/downloads
    - /mediapool/media/downloads/incomplete

# Jellyfin transcoding cache - owned by UID 100102 (unprivileged LXC maps UID 102→100102)
# Jellyfin runs as UID 102 inside the container
- name: Create transcoding directory for Jellyfin
  ansible.builtin.file:
    path: /mediapool/media/transcoding
    state: directory
    owner: "100102"
    group: "100105"
    mode: "0755"

- name: Set ownership on media directory
  ansible.builtin.file:
    path: /mediapool/media
    owner: "1000"
    group: "1000"
    mode: "0775"
    recurse: true

- name: Set ownership on transcoding directory
  ansible.builtin.file:
    path: /mediapool/media/transcoding
    owner: "100102"
    group: "100105"
    mode: "0755"
    recurse: true

- name: Configure NFS exports
  ansible.builtin.template:
    dest: /etc/exports
    src: exports.j2
    mode: "0644"
  notify: Reload NFS exports

- name: Enable and start NFS server
  ansible.builtin.systemd:
    name: nfs-kernel-server
    state: started
    enabled: true

- name: Verify NFS exports
  ansible.builtin.command:
    cmd: exportfs -v
  register: nfs_exports_status
  changed_when: false

- name: Display current NFS exports
  ansible.builtin.debug:
    msg: "{{ nfs_exports_status.stdout_lines }}"

# Configure Proxmox cluster firewall to allow NFS traffic from media_services_vm only
- name: Ensure cluster firewall file exists
  ansible.builtin.copy:
    dest: /etc/pve/firewall/cluster.fw
    content: |
      [OPTIONS]
      policy_in: DROP
      enable: 1

      [RULES]
    mode: "0640"
    force: false

- name: Add NFS firewall rules to Proxmox cluster
  ansible.builtin.blockinfile:
    path: /etc/pve/firewall/cluster.fw
    marker: "# {mark} ANSIBLE MANAGED - NFS Server"
    insertafter: "\\[RULES\\]"
    block: |
      IN ACCEPT -source {{ media_services_ip }} -p tcp -dport 111 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p udp -dport 111 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p tcp -dport 2049 -log nolog
      IN ACCEPT -source {{ media_services_ip }} -p udp -dport 2049 -log nolog
  notify: Reload pve-firewall
